name: Daemon Release

on:
  push:
    tags: ['daemon-v*']
  pull_request:
    paths: [daemon/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxss-dev libxdo-dev libdbus-1-dev libpulse-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: timeoracle-daemon-deb
          path: daemon/target/debian/*.deb
          retention-days: 14

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: timeoracle-daemon-linux-binary
          path: daemon/target/release/timeoracle-daemon
          retention-days: 14

      - name: Prepare release tarball
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd target/release
          tar czf timeoracle-daemon-linux-x86_64.tar.gz timeoracle-daemon
          sha256sum timeoracle-daemon-linux-x86_64.tar.gz > timeoracle-daemon-linux-x86_64.tar.gz.sha256

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: |
            daemon/target/debian/*.deb
            daemon/target/release/timeoracle-daemon-linux-x86_64.tar.gz
            daemon/target/release/timeoracle-daemon-linux-x86_64.tar.gz.sha256

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon

      - name: Build release binary
        run: cargo build --release --no-default-features

      - name: Assemble .app bundle
        run: |
          mkdir -p TimeOracle.app/Contents/MacOS
          cp target/release/timeoracle-daemon TimeOracle.app/Contents/MacOS/
          cp pkg/macos/Info.plist TimeOracle.app/Contents/

      - name: Create .pkg installer
        run: |
          VERSION="${GITHUB_REF_NAME#daemon-v}"
          VERSION="${VERSION:-0.0.0}"

          pkgbuild \
            --component TimeOracle.app \
            --install-location /Applications \
            --scripts pkg/macos/scripts \
            --identifier com.timeoracle.daemon \
            --version "$VERSION" \
            timeoracle-daemon-macos-arm64.pkg

          shasum -a 256 timeoracle-daemon-macos-arm64.pkg > timeoracle-daemon-macos-arm64.pkg.sha256

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: timeoracle-daemon-pkg
          path: |
            daemon/timeoracle-daemon-macos-arm64.pkg
            daemon/timeoracle-daemon-macos-arm64.pkg.sha256
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux release assets
        uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets/

      - name: Download macOS release assets
        uses: actions/download-artifact@v4
        with:
          name: timeoracle-daemon-pkg
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daemon ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**
