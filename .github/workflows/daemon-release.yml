name: Daemon Release

on:
  push:
    tags: ['daemon-v*']
  pull_request:
    paths: [daemon/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxss-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Upload .deb artifact (PRs and branches)
        uses: actions/upload-artifact@v4
        with:
          name: timeoracle-daemon-deb
          path: daemon/target/debian/*.deb
          retention-days: 14

      - name: Upload binary artifact (PRs and branches)
        uses: actions/upload-artifact@v4
        with:
          name: timeoracle-daemon-binary
          path: daemon/target/release/timeoracle-daemon
          retention-days: 14

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd target/release
          tar czf timeoracle-daemon-linux-x86_64.tar.gz timeoracle-daemon
          sha256sum timeoracle-daemon-linux-x86_64.tar.gz > timeoracle-daemon-linux-x86_64.tar.gz.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Daemon ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            daemon/target/debian/*.deb
            daemon/target/release/timeoracle-daemon-linux-x86_64.tar.gz
            daemon/target/release/timeoracle-daemon-linux-x86_64.tar.gz.sha256
